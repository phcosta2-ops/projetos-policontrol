/* === SIMPLE SVG CHARTS (no external deps) === */
function SimplePie({ data, size = 150, inner = 35, outer = 60 }) {
  const total = data.reduce((s, d) => s + d.value, 0);
  if (!total) return null;
  let cum = 0;
  const paths = data.map((d, i) => {
    const start = cum / total * 2 * Math.PI - Math.PI / 2;
    cum += d.value;
    const end = cum / total * 2 * Math.PI - Math.PI / 2;
    const la = d.value / total > 0.5 ? 1 : 0;
    const cx = size / 2, cy = size / 2;
    const x1 = cx + outer * Math.cos(start), y1 = cy + outer * Math.sin(start);
    const x2 = cx + outer * Math.cos(end), y2 = cy + outer * Math.sin(end);
    const x3 = cx + inner * Math.cos(end), y3 = cy + inner * Math.sin(end);
    const x4 = cx + inner * Math.cos(start), y4 = cy + inner * Math.sin(start);
    const path = `M${x1},${y1} A${outer},${outer} 0 ${la} 1 ${x2},${y2} L${x3},${y3} A${inner},${inner} 0 ${la} 0 ${x4},${y4} Z`;
    return { ...d, path, pct: Math.round(d.value / total * 100) };
  });
  return (<svg viewBox={`0 0 ${size} ${size}`} style={{ width: "100%", maxWidth: size }}>{paths.map((p, i) => <path key={i} d={p.path} fill={p.fill} opacity={0.85}><title>{p.name}: {p.value} ({p.pct}%)</title></path>)}{paths.map((p, i) => { const angle = (paths.slice(0, i).reduce((s, x) => s + x.value, 0) + p.value / 2) / total * 2 * Math.PI - Math.PI / 2; const lx = size / 2 + (outer + 14) * Math.cos(angle); const ly = size / 2 + (outer + 14) * Math.sin(angle); return p.pct > 5 ? <text key={"l" + i} x={lx} y={ly} textAnchor="middle" dominantBaseline="middle" style={{ fontSize: 7, fill: "#6E6E73", fontFamily: "'Inter',sans-serif" }}>{p.name.slice(0, 8)}({p.value})</text> : null; })}</svg>);
}

function SimpleBar({ data, height = 170, horizontal = false, colorFn }) {
  if (!data.length) return null;
  const maxVal = Math.max(...data.map(d => Math.abs(d.value)));
  if (horizontal) {
    const bh = Math.min(22, Math.max(14, 170 / data.length));
    const h = data.length * (bh + 4) + 10;
    const lw = 110, cw = 300;
    return (<svg viewBox={`0 0 ${lw + cw + 40} ${h}`} style={{ width: "100%", maxHeight: 400 }}>{data.map((d, i) => {
      const y = i * (bh + 4) + 5;
      const w = maxVal ? Math.abs(d.value) / maxVal * (cw / 2) : 0;
      const isNeg = d.value < 0;
      const x = isNeg ? lw + cw / 2 - w : lw + cw / 2;
      const c = colorFn ? colorFn(d.value) : "#007AFF";
      return (<g key={i}><text x={lw - 4} y={y + bh / 2 + 1} textAnchor="end" style={{ fontSize: 8, fill: "#6E6E73", fontFamily: "'Inter',sans-serif" }}>{d.name}</text><rect x={x} y={y} width={w || 1} height={bh} rx={3} fill={c} opacity={0.8}><title>{d.full || d.name}: {d.value}d</title></rect><text x={x + (isNeg ? -4 : w + 4)} y={y + bh / 2 + 1} textAnchor={isNeg ? "end" : "start"} style={{ fontSize: 7, fill: "#86868B", fontFamily: "'JetBrains Mono',monospace" }}>{d.value}d</text></g>);
    })}<line x1={lw + cw / 2} y1={0} x2={lw + cw / 2} y2={h} stroke="#E5E5EA" strokeWidth={1} /></svg>);
  }
  return (<svg viewBox={`0 0 ${data.length * 50 + 20} ${height}`} style={{ width: "100%", maxHeight: height }}>{data.map((d, i) => {
    const bw = 30, gap = 50, x = i * gap + 15;
    const h = maxVal ? d.value / maxVal * (height - 40) : 0;
    const y = height - 20 - h;
    return (<g key={i}><rect x={x} y={y} width={bw} height={h} rx={4} fill={d.fill || "#007AFF"} opacity={0.8}><title>{d.full || d.name}: {d.value}</title></rect><text x={x + bw / 2} y={height - 6} textAnchor="middle" style={{ fontSize: 7, fill: "#86868B", fontFamily: "'Inter',sans-serif" }}>{d.name}</text><text x={x + bw / 2} y={y - 4} textAnchor="middle" style={{ fontSize: 8, fill: "#6E6E73", fontWeight: 600, fontFamily: "'JetBrains Mono',monospace" }}>{d.value}</text></g>);
  })}</svg>);
}

/* VOICE MIC BUTTON */
function MicBtn({ onResult, sz }) {
  const [on, setOn] = useState(false); const ref = useRef(null);
  const SR = typeof window !== "undefined" && (window.SpeechRecognition || window.webkitSpeechRecognition);
  if (!SR) return null;
  const toggle = () => {
    if (on) { ref.current?.stop(); ref.current = null; setOn(false); return; }
    const r = new SR(); r.lang = "pt-BR"; r.continuous = true; r.interimResults = true;
    r.onresult = e => { let t = ""; for (let i = 0; i < e.results.length; i++) t += e.results[i][0].transcript; onResult(t); };
    r.onerror = () => setOn(false); r.onend = () => setOn(false);
    ref.current = r; r.start(); setOn(true);
  };
  const size = sz || 40;
  return <button onClick={toggle} style={{ fontSize: size * .45, background: on ? "#E8363C" : "#007AFF", color: "#fff", border: "none", borderRadius: "50%", width: size, height: size, cursor: "pointer", flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center", boxShadow: on ? "0 0 16px rgba(232,54,60,0.5)" : "0 2px 8px rgba(0,122,255,0.3)", animation: on ? "recording 1.2s infinite" : "none", transition: "all .2s" }} title={on ? "Parar" : "Falar"}>{on ? "⏹" : "🎤"}</button>;
}

const callAI = async (systemPrompt, userMsg) => {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST", headers: { "Content-Type": "application/json", "x-api-key": (localStorage.getItem("poli-api-key") || ""), "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
    body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1500, system: systemPrompt, messages: [{ role: "user", content: userMsg }] })
  });
  const d = await res.json();
  if (d.error) throw new Error(d.error.message || "Erro API");
  const raw = d.content.map(i => i.text || "").join("").replace(/```json|```/g, "").trim();
  return raw;
};

      <h1 style={{ fontSize: 18, fontWeight: 700, margin: 0, color: "#007AFF" }}>Projetos DNP</h1>
      <p style={{ fontSize: 13, color: "#86868B", marginTop: 4 }}>Selecione seu perfil:</p>
      <div style={{ height: 1, background: "#E5E5EA", margin: "20px 0" }} />

      {!loginPending ? (
        <div style={{ display: "grid", gridTemplateColumns: U.length > 4 ? "1fr 1fr 1fr" : "1fr 1fr", gap: 8 }}>
          {U.map(u => <button key={u.id} onClick={() => tryLogin(u)} style={{ fontFamily: "'Inter',sans-serif", fontSize: 13, fontWeight: 600, background: "#F9F9F9", color: "#1D1D1F", border: "2px solid #E5E5EA", borderRadius: 12, padding: "12px 8px", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 6, transition: "all .2s" }} onMouseEnter={e => { e.currentTarget.style.background = u.color; e.currentTarget.style.color = "#fff"; e.currentTarget.style.borderColor = u.color; }} onMouseLeave={e => { e.currentTarget.style.background = "#F9F9F9"; e.currentTarget.style.color = "#1D1D1F"; e.currentTarget.style.borderColor = "#E5E5EA"; }}>
            <span style={{ width: 9, height: 9, borderRadius: "50%", background: u.color }} />{u.name}{u.password && <span style={{ fontSize: 10 }}>🔒</span>}
          </button>)}
        </div>
      ) : (
        <div>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 8, marginBottom: 16 }}>
            <span style={{ width: 14, height: 14, borderRadius: "50%", background: loginPending.color }} />
            <span style={{ fontSize: 16, fontWeight: 700 }}>{loginPending.name}</span>
          </div>
          <input type="password" value={pwInput} onChange={e => { setPwInput(e.target.value); setPwErr(false); }} onKeyDown={e => e.key === "Enter" && confirmLogin()} placeholder="Digite sua senha" style={{ ...S.inp, textAlign: "center", fontSize: 16, padding: "12px", marginBottom: 8 }} autoFocus />
          {pwErr && <p style={{ fontSize: 12, color: "#E8363C", marginBottom: 8 }}>Senha incorreta</p>}
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={() => { setLoginPending(null); setPwErr(false); }} style={{ fontFamily: "inherit", flex: 1, fontSize: 13, background: "#F2F2F7", color: "#86868B", border: "none", borderRadius: 10, padding: 12, cursor: "pointer" }}>Voltar</button>
            <button onClick={confirmLogin} style={{ ...S.btn, flex: 1, padding: 12, fontSize: 13, borderRadius: 10 }}>Entrar</button>
          </div>
        </div>
      )}
    </div>
  </div>);

  const myAct = P.flatMap(p => (p.actions || []).filter(a => a.assignee === user.id && a.status !== "Concluída" && a.status !== "Cancelada").map(a => ({ ...a, pName: p.name, pId: p.id }))); const ovAct = myAct.filter(a => isOv(a.dueDate));
  const filtered = P.filter(p => { if (search && !p.name.toLowerCase().includes(search.toLowerCase())) return false; if (fSt !== "Todos" && p.status !== fSt) return false; return true; });
  const saveProj = proj => { let np; const genActions = proj._generatedActions || []; if (editP) np = P.map(p => p.id === editP.id ? { ...editP, ...proj } : p); else { const cleanProj = { ...proj }; delete cleanProj._generatedActions; np = [...P, { ...cleanProj, id: gid(), actions: genActions, docs: [], updates: [], createdBy: user.id, createdAt: today() }]; } save({ ...data, projects: np }); setShowPF(false); setEditP(null); flash(genActions.length > 0 ? `Projeto criado com ${genActions.length} ações!` : "OK!"); };
  const delProj = id => { if (!confirm("Excluir?")) return; save({ ...data, projects: P.filter(p => p.id !== id) }); setSelProj(null); setView("projects"); };
  const saveAct = a => { const pr = P.find(p => p.id === selProj); if (!pr) return; let na; if (editA) { na = pr.actions.map(x => x.id === editA.id ? { ...editA, ...a } : x); } else { const newAction = { ...a, id: gid(), createdBy: user.id, createdAt: today() }; if (insertIdx !== null) { na = [...(pr.actions || [])]; na.splice(insertIdx, 0, newAction); } else { na = [...(pr.actions || []), newAction]; } } save({ ...data, projects: P.map(p => p.id === selProj ? { ...p, actions: na, dataAtualizacao: today() } : p) }); setShowAF(false); setEditA(null); setInsertIdx(null); flash("OK!"); };

      <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
        <button onClick={() => setShowUpd(true)} style={{ fontFamily: "inherit", fontSize: 12, fontWeight: 600, background: "#007AFF", color: "#fff", border: "none", borderRadius: 18, padding: "8px 16px", cursor: "pointer", boxShadow: "0 2px 8px rgba(0,122,255,0.3)" }}>🎤 Atualizar</button>

    <nav style={{ display: "flex", gap: 2, padding: "7px 16px", background: "rgba(255,255,255,0.6)", backdropFilter: "blur(10px)", borderBottom: "1px solid #E5E5EA", flexWrap: "wrap", overflowX: "auto" }}>
      {[{ k: "dashboard", l: "Dashboard" }, { k: "projects", l: "Projetos" }, { k: "myactions", l: `Ações${myAct.length ? ` (${myAct.length})` : ""}` }, { k: "automation", l: "⚡ Automação" }, { k: "settings", l: "Config" }].map(i => (
        <button key={i.k} onClick={() => { setView(i.k); setSelProj(null); setShowPF(false); setShowAF(false); setDtab("acoes"); }} style={{ fontFamily: "inherit", fontSize: 11, fontWeight: 600, background: view === i.k ? "#007AFF" : "transparent", color: view === i.k ? "#fff" : (i.k === "myactions" && ovAct.length ? "#E8363C" : "#86868B"), border: "none", borderRadius: 18, padding: "6px 13px", cursor: "pointer", display: "flex", alignItems: "center", gap: 3, whiteSpace: "nowrap" }}>{i.l}{i.k === "myactions" && ovAct.length > 0 && <span style={{ background: "#E8363C", color: "#fff", fontSize: 8, fontWeight: 700, borderRadius: 6, padding: "1px 5px" }}>{ovAct.length}</span>}</button>))}
    </nav>

    {showUpd && <SmartUpdate projects={P} userId={user.id} onApply={r => { applyAI(r); setShowUpd(false); flash("✅ " + r.summary); }} onClose={() => setShowUpd(false)} />}

    <main style={{ maxWidth: 1060, margin: "0 auto", padding: "18px 16px 50px" }}>
      {/* DASHBOARD */}
      {view === "dashboard" && <div><h2 style={S.h2}>Dashboard</h2><div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(100px,1fr))", gap: 8, marginBottom: 16 }}>{[{ l: "Projetos", v: P.length, c: "#007AFF" }, { l: "No Prazo", v: P.filter(p => p.status === "No prazo").length, c: "#34C759" }, { l: "Atrasados", v: P.filter(p => p.status === "Atrasado").length, c: "#E8363C" }, { l: "Em Risco", v: P.filter(p => p.status === "Em risco").length, c: "#FF9500" }].map((x, i) => (<div key={i} style={S.card}><div style={{ fontSize: 24, fontWeight: 700, fontFamily: "'JetBrains Mono',monospace", color: x.c }}>{x.v}</div><div style={{ fontSize: 10, color: "#86868B", fontWeight: 600 }}>{x.l}</div></div>))}</div>

        {/* METAS POR SEMESTRE */}
        {(() => {
          const now = new Date();
          const year = now.getFullYear();
          const sem = now.getMonth() < 6 ? 1 : 2;
          const semLabel = `${sem}° Semestre ${year}`;
          const semStart = sem === 1 ? `${year}-01-01` : `${year}-07-01`;
          const semEnd = sem === 1 ? `${year}-06-30` : `${year}-12-31`;

          const countByType = (area, tipos) => P.filter(p => 
            p.area === area && 
            tipos.includes(p.tipo) && 
            p.phase === "Concluído" &&
            p.dataAtualizacao >= semStart && p.dataAtualizacao <= semEnd
          ).length;

          const ativosCount = (area, tipos) => P.filter(p =>
            p.area === area &&
            tipos.includes(p.tipo) &&
            p.phase !== "Concluído"
          ).length;

          const areas = [
            { area: "Des. Industrial", icon: "🏭", color: "#007AFF" },
            { area: "Des. Químico", icon: "🧪", color: "#34C759" },
          ];

          const goals = [
            { label: "Novo Produto", tipos: ["Novo Produto"], emoji: "🆕", meta: 2, color: "#007AFF" },
            { label: "Melhoria / Red. Custo", tipos: ["Melhoria", "Redução de Custo"], emoji: "🔧", meta: 2, color: "#FF9500" },
          ];

          const ProgressBar = ({ current, target, color }) => {
            const pct = Math.min(100, Math.round(current / target * 100));
            const ok = current >= target;
            return (<div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <div style={{ flex: 1, height: 8, background: "#F2F2F7", borderRadius: 4, overflow: "hidden" }}>
                <div style={{ width: `${pct}%`, height: "100%", background: ok ? "#34C759" : color, borderRadius: 4, transition: "width .3s" }} />
              </div>
              <span style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: 12, fontWeight: 700, color: ok ? "#34C759" : current > 0 ? color : "#AEAEB2", minWidth: 40 }}>
                {current}/{target}
              </span>
              {ok && <span style={{ fontSize: 12 }}>✅</span>}
            </div>);
          };

          return (<div style={{ ...S.card, marginBottom: 14 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12 }}>
              <span style={{ fontSize: 16 }}>🎯</span>
              <div>
                <div style={{ fontSize: 13, fontWeight: 700 }}>Metas de Entrega — {semLabel}</div>
                <div style={{ fontSize: 10, color: "#86868B" }}>Projetos concluídos no semestre (meta ≥ 2 por tipo)</div>
              </div>
            </div>

            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(260px,1fr))", gap: 12 }}>
              {areas.map(ac => {
                const totalArea = P.filter(p => p.area === ac.area && p.phase !== "Concluído").length;
                return (<div key={ac.area} style={{ background: "#F9F9FB", borderRadius: 12, padding: 14, border: `1px solid ${ac.color}15` }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 12 }}>
                    <span style={{ fontSize: 16 }}>{ac.icon}</span>
                    <div>
                      <div style={{ fontSize: 13, fontWeight: 700, color: ac.color }}>{ac.area}</div>
                      <div style={{ fontSize: 9, color: "#AEAEB2" }}>{totalArea} projeto(s) ativo(s)</div>
                    </div>
                  </div>

                  {goals.map(g => {
                    const entregues = countByType(ac.area, g.tipos);
                    const emAndamento = ativosCount(ac.area, g.tipos);
                    return (<div key={g.label} style={{ marginBottom: 10 }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
                        <span style={{ fontSize: 11, fontWeight: 600, color: "#6E6E73", display: "flex", alignItems: "center", gap: 4 }}>{g.emoji} {g.label}</span>
                        {emAndamento > 0 && <span style={{ fontSize: 9, color: "#007AFF", background: "#007AFF12", padding: "1px 6px", borderRadius: 4 }}>{emAndamento} em andamento</span>}
                      </div>
                      <ProgressBar current={entregues} target={g.meta} color={g.color} />
                    </div>);
                  })}

                  {/* Resumo visual dos tipos */}
                  <div style={{ display: "flex", gap: 4, marginTop: 6, flexWrap: "wrap" }}>
                    {P.filter(p => p.area === ac.area && p.phase !== "Concluído").map(p => {
                      const tc = p.tipo === "Novo Produto" ? "#007AFF" : p.tipo === "Melhoria" ? "#FF9500" : p.tipo === "Redução de Custo" ? "#34C759" : "#AEAEB2";
                      return (<span key={p.id} title={p.name + " — " + (p.tipo || "Sem tipo")} style={{ width: 8, height: 8, borderRadius: 2, background: tc, opacity: 0.7, cursor: "help" }} />);
                    })}
                  </div>
                </div>);
              })}
            </div>

            {/* Contratado resumo compacto */}
            {(() => {
              const cont = P.filter(p => p.area === "Contratado" && p.phase !== "Concluído");

      </div>}

      {/* MY ACTIONS */}
      {view === "myactions" && <div><h2 style={S.h2}>Minhas Ações</h2>{myAct.length === 0 ? <div style={{ ...S.card, textAlign: "center", color: "#AEAEB2", padding: 24 }}>🎉</div> : myAct.sort((a, b) => { if (!a.dueDate) return 1; if (!b.dueDate) return -1; return a.dueDate.localeCompare(b.dueDate); }).map(a => { const ov = isOv(a.dueDate); return (<div key={a.id} style={{ ...S.card, borderLeft: `3px solid ${ov ? "#E8363C" : "#E5E5EA"}`, marginBottom: 5, borderRadius: "3px 12px 12px 3px", cursor: "pointer" }} onClick={() => { setSelProj(a.pId); setView("projects"); setDtab("acoes"); }}><div style={{ display: "flex", justifyContent: "space-between", gap: 6, flexWrap: "wrap" }}><div><div style={{ fontSize: 12, fontWeight: 600 }}>{a.title}</div><div style={{ fontSize: 10, color: "#86868B", marginTop: 1 }}>{a.pName}</div></div><Badge status={ov ? "Atrasado" : "Em risco"} /></div>{a.dueDate && <div style={{ fontSize: 9, fontFamily: "'JetBrains Mono',monospace", color: ov ? "#E8363C" : "#86868B", marginTop: 3 }}>{ov ? "⚠ " : ""}Prazo: {fmt(a.dueDate)}</div>}</div>); })}</div>}

      {/* ===== AUTOMAÇÃO ===== */}
      {view === "automation" && <AutomationTab alerts={alerts} projects={P} users={U} onSaveAlerts={a => save({ ...data, alerts: a })} genOverdueEmail={genOverdueEmail} genUpcomingEmail={genUpcomingEmail} genWeeklyEmail={genWeeklyEmail} genStaleEmail={genStaleEmail} openMailto={openMailto} flash={flash} />}

      {/* CONFIG */}
      {view === "settings" && <Cfg users={U} audit={audit} onSave={uu => { const changes = uu.filter((u, i) => U[i] && u.name !== U[i].name).map(u => u.name); if (changes.length) addAudit("rename", `Nomes alterados: ${changes.join(", ")}`); save({ ...data, users: uu }); const me = uu.find(u => u.id === user.id); if (me) setUser(me); flash("OK!"); }} onAddUser={nu => { const nd = { ...data, users: [...U, nu], auditLog: [...audit, { id: gid(), action: "add_user", detail: `Usuário "${nu.name}" criado`, userId: user.id, timestamp: new Date().toISOString() }] }; save(nd); flash("Usuário adicionado!"); }} onRemoveUser={uid => { const removed = U.find(u => u.id === uid); const nd = { ...data, users: U.filter(u => u.id !== uid), auditLog: [...audit, { id: gid(), action: "remove_user", detail: `Usuário "${removed?.name}" removido`, userId: user.id, timestamp: new Date().toISOString() }] }; save(nd); flash("Removido", "w"); }} onUpdatePassword={(uid, pw) => { const nd = { ...data, users: U.map(u => u.id === uid ? { ...u, password: pw || undefined } : u), auditLog: [...audit, { id: gid(), action: "password", detail: `Senha ${pw ? "definida" : "removida"} para "${un(uid)}"`, userId: user.id, timestamp: new Date().toISOString() }] }; save(nd); if (uid === user.id) setUser({ ...user, password: pw || undefined }); flash(pw ? "Senha definida!" : "Senha removida!"); }} onReset={() => { if (confirm("Restaurar?")) { save(initData); flash("OK", "w"); } }} />}
    </main>
  </div>);
}

/* ===== AUTOMATION TAB ===== */
function AutomationTab({ alerts, projects, users, onSaveAlerts, genOverdueEmail, genUpcomingEmail, genWeeklyEmail, genStaleEmail, openMailto, flash }) {
  const [editIdx, setEditIdx] = useState(null);
  const [form, setForm] = useState({ type: "overdue", emails: "", days: 7, active: true, description: "" });
  const [showForm, setShowForm] = useState(false);
  const [aiText, setAiText] = useState("");
  const [aiStep, setAiStep] = useState("idle"); // idle, processing, done
  const [aiResult, setAiResult] = useState(null);

  const startEdit = (idx) => { setForm({ ...alerts[idx] }); setEditIdx(idx); setShowForm(true); };
  const saveForm = () => {
    if (!form.emails.trim()) return;
    let na = [...alerts];
    if (editIdx !== null) na[editIdx] = form; else na.push({ ...form, id: gid(), createdAt: today() });
    onSaveAlerts(na); setShowForm(false); setEditIdx(null); flash("Alerta salvo!");
  };
  const delAlert = idx => { onSaveAlerts(alerts.filter((_, i) => i !== idx)); flash("Removido", "w"); };
  const toggleAlert = idx => { const na = [...alerts]; na[idx] = { ...na[idx], active: !na[idx].active }; onSaveAlerts(na); };

  const fireAlert = (alert) => {
    let emailData;
    switch (alert.type) {
      case "overdue": emailData = genOverdueEmail(); break;
      case "upcoming": emailData = genUpcomingEmail(alert.days || 7); break;
      case "weekly": emailData = genWeeklyEmail(); break;
      case "stale": emailData = genStaleEmail(alert.days || 14); break;
      case "custom": emailData = genCustomEmail(alert); break;
    }
    openMailto(alert.emails, emailData);
  };

  const genCustomEmail = (alert) => {
    const items = [];
    if (alert.triggerType === "upcoming_per_user") {
      projects.forEach(p => { (p.actions || []).filter(a => { const d = daysTo(a.dueDate); return d !== null && d >= 0 && d <= (alert.days || 3) && a.status !== "Concluída" && a.status !== "Cancelada"; }).forEach(a => {
        const u = users.find(x => x.id === a.assignee);
        items.push(`• ${p.name}: "${a.title}" — Vence ${fmt(a.dueDate)} — Resp: ${u?.name || "?"} (${u?.email || "sem email"})`);
      }); });
    } else if (alert.triggerType === "overdue_per_user") {
      projects.forEach(p => { (p.actions || []).filter(a => isOv(a.dueDate) && a.status !== "Concluída" && a.status !== "Cancelada").forEach(a => {
        const u = users.find(x => x.id === a.assignee);
        items.push(`• ${p.name}: "${a.title}" — Venceu ${fmt(a.dueDate)} — Resp: ${u?.name || "?"}`);
      }); });
    }
    if (!items.length) return null;
    return { subject: alert.emailSubject || `Alerta Projetos Policontrol — ${fmt(today())}`, body: `${alert.description || "Alerta automático"}:\n\n${items.join("\n")}\n\nAcesse o app para atualizar.` };
  };

  const typeInfo = id => ALERT_TYPES.find(t => t.id === id) || { icon: "⚡", label: id || "Personalizado", desc: "" };

  const getCount = (type, days) => {
    switch (type) {
      case "overdue": return projects.reduce((s, p) => s + (p.actions || []).filter(a => isOv(a.dueDate) && a.status !== "Concluída" && a.status !== "Cancelada").length, 0);
      case "upcoming": return projects.reduce((s, p) => s + (p.actions || []).filter(a => { const d = daysTo(a.dueDate); return d !== null && d >= 0 && d <= (days || 7) && a.status !== "Concluída" && a.status !== "Cancelada"; }).length, 0);
      case "weekly": return projects.filter(p => p.phase !== "Concluído").length;
      case "stale": return projects.filter(p => { if (!p.dataAtualizacao || p.phase === "Concluído") return false; const d = daysTo(p.dataAtualizacao); return d !== null && Math.abs(d) >= (days || 14); }).length;
      case "custom": return projects.reduce((s, p) => s + (p.actions || []).filter(a => { const d = daysTo(a.dueDate); return d !== null && d >= 0 && d <= (days || 3) && a.status !== "Concluída" && a.status !== "Cancelada"; }).length, 0);
      default: return 0;
    }
  };

  /* AI processing */
  const usersCtx = users.map(u => `"${u.name}" (email: ${u.email || "não cadastrado"}, whatsapp: ${u.phone || "não cadastrado"})`).join(", ");
  const processAI = async () => {
    if (!aiText.trim()) return;
    setAiStep("processing");
    try {
      const sysPrompt = `Você é um assistente que cria regras de automação para um app de projetos. Interprete o pedido do usuário e retorne APENAS JSON puro (sem backticks).

USUÁRIOS CADASTRADOS: ${usersCtx}

TIPOS DE ALERTA DISPONÍVEIS:
- "overdue": ações atrasadas (já venceram)
- "upcoming": prazos se aproximando (X dias antes)  
- "weekly": resumo semanal de todos os projetos
- "stale": projetos sem atualização há X dias
- "custom": regra personalizada

REGRAS:
1. Identifique o tipo de alerta mais adequado
2. Se o usuário pedir "mandar para o responsável", use os emails dos usuários cadastrados. Se disse "para todos", junte todos os emails.
3. Se mencionou dias (ex: "3 dias antes"), use no campo days
4. description = resumo legível do que o alerta faz
5. Se pediu algo para responsável individual, use triggerType: "upcoming_per_user" ou "overdue_per_user"

JSON:
{"type":"upcoming","days":3,"emails":"emails separados por vírgula","description":"Descrição legível do alerta","triggerType":"upcoming_per_user","emailSubject":"Assunto do email sugerido"}

Se não entender: {"error":"mensagem"}`;
      const raw = await callAI(sysPrompt, aiText);
      const parsed = JSON.parse(raw);
      if (parsed.error) { flash(parsed.error, "err"); setAiStep("idle"); return; }
      setAiResult(parsed); setAiStep("done");
    } catch (e) { flash("Erro: " + e.message, "err"); setAiStep("idle"); }
  };

  const applyAI = () => {
    if (!aiResult) return;
    const newAlert = { id: gid(), type: aiResult.type || "custom", days: aiResult.days || 7, emails: aiResult.emails || "", description: aiResult.description || aiText, triggerType: aiResult.triggerType || null, emailSubject: aiResult.emailSubject || "", active: true, createdAt: today(), createdByAI: true };
    onSaveAlerts([...alerts, newAlert]);
    setAiText(""); setAiResult(null); setAiStep("idle");
    flash("Alerta criado pela IA!");
  };

  return (<div>
    <h2 style={S.h2}>⚡ Automação de Alertas</h2>

    {/* AI INPUT */}
    <div style={{ ...S.card, marginBottom: 14, border: "1px solid #AF52DE33", background: "#FAF5FF" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 8 }}>
        <span style={{ fontSize: 18 }}>✨</span>
        <span style={{ fontSize: 14, fontWeight: 700, color: "#AF52DE" }}>Criar alerta com IA</span>
      </div>
      <p style={{ fontSize: 12, color: "#86868B", marginBottom: 10, lineHeight: 1.5 }}>Descreva o que precisa e a IA cria o alerta automaticamente.</p>

      {aiStep === "idle" && <>
        <textarea value={aiText} onChange={e => setAiText(e.target.value)} placeholder='Ex: "Quando uma ação estiver a 3 dias de vencer, manda email pro responsável"' style={{ ...S.inp, minHeight: 60, resize: "vertical", fontSize: 13, lineHeight: 1.5, marginBottom: 8 }} />
        <div style={{ display: "flex", gap: 6, fontSize: 11, color: "#AEAEB2", marginBottom: 10, flexWrap: "wrap" }}>
          {["Aviso 3 dias antes do prazo para o responsável", "Resumo semanal para toda equipe", "Alerta de ações atrasadas para gestores", "Projetos parados há 15 dias"].map(ex => (
            <button key={ex} onClick={() => setAiText(ex)} style={{ fontFamily: "inherit", fontSize: 10, background: "#fff", color: "#6E6E73", border: "1px solid #E5E5EA", borderRadius: 20, padding: "4px 10px", cursor: "pointer" }}>{ex}</button>
          ))}
        </div>
        <button onClick={processAI} disabled={!aiText.trim()} style={{ ...S.btn, width: "100%", padding: 12, fontSize: 13, borderRadius: 10, background: "#AF52DE", opacity: aiText.trim() ? 1 : .4 }}>Criar alerta com IA ✨</button>
      </>}

      {aiStep === "processing" && <div style={{ textAlign: "center", padding: 20 }}><div style={{ width: 30, height: 30, border: "3px solid #E5E5EA", borderTopColor: "#AF52DE", borderRadius: "50%", animation: "spin .7s linear infinite", margin: "0 auto" }} /><p style={{ color: "#86868B", marginTop: 10, fontSize: 12 }}>Interpretando...</p></div>}

      {aiStep === "done" && aiResult && <div>
        <div style={{ background: "#fff", border: "1px solid #AF52DE22", borderRadius: 10, padding: 12, marginBottom: 10 }}>
          <div style={{ fontSize: 12, fontWeight: 700, color: "#AF52DE", marginBottom: 6 }}>✓ Alerta interpretado</div>
          <div style={{ fontSize: 13, color: "#1D1D1F", marginBottom: 6, lineHeight: 1.5 }}>{aiResult.description}</div>
          <div style={{ fontSize: 11, color: "#86868B" }}>Tipo: <strong>{typeInfo(aiResult.type).label}</strong></div>
          {aiResult.days && <div style={{ fontSize: 11, color: "#86868B" }}>Antecedência: <strong>{aiResult.days} dias</strong></div>}
          <div style={{ fontSize: 11, color: "#86868B" }}>Destinatários: <strong>{aiResult.emails || "não identificado"}</strong></div>
          {aiResult.emailSubject && <div style={{ fontSize: 11, color: "#86868B" }}>Assunto: <strong>{aiResult.emailSubject}</strong></div>}
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          <button onClick={() => { setAiStep("idle"); setAiResult(null); }} style={{ fontFamily: "inherit", flex: 1, fontSize: 12, background: "#F2F2F7", color: "#6E6E73", border: "none", borderRadius: 10, padding: 10, cursor: "pointer" }}>✏ Refazer</button>
          <button onClick={applyAI} style={{ ...S.btn, flex: 1, padding: 10, fontSize: 12, borderRadius: 10, background: "#AF52DE" }}>✅ Criar Alerta</button>
        </div>
      </div>}
    </div>

    {/* MANUAL ADD */}
    <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: 10 }}>
      <button onClick={() => { setForm({ type: "overdue", emails: "", days: 7, active: true, description: "" }); setEditIdx(null); setShowForm(!showForm); }} style={{ fontFamily: "inherit", fontSize: 10, background: "#F2F2F7", color: "#86868B", border: "none", borderRadius: 6, padding: "5px 10px", cursor: "pointer" }}>{showForm ? "Cancelar" : "+ Manual"}</button>
    </div>

    {showForm && <div style={{ ...S.card, marginBottom: 14, border: "1px solid #007AFF33" }}>
      <h3 style={{ fontSize: 13, fontWeight: 700, marginTop: 0, marginBottom: 10 }}>{editIdx !== null ? "Editar" : "Novo"} Alerta Manual</h3>
      <div style={{ marginBottom: 8 }}>
        <label style={S.lbl}>Tipo</label>
        <select style={S.inp} value={form.type} onChange={e => setForm({ ...form, type: e.target.value })}>
          {ALERT_TYPES.map(t => <option key={t.id} value={t.id}>{t.icon} {t.label}</option>)}
        </select>
      </div>
      {(form.type === "upcoming" || form.type === "stale") && <div style={{ marginBottom: 8 }}><label style={S.lbl}>Dias</label><input type="number" min="1" max="90" value={form.days} onChange={e => setForm({ ...form, days: parseInt(e.target.value) || 7 })} style={{ ...S.inp, width: 80 }} /></div>}
      <div style={{ marginBottom: 8 }}><label style={S.lbl}>Emails (vírgula)</label><input value={form.emails} onChange={e => setForm({ ...form, emails: e.target.value })} placeholder="email@empresa.com" style={S.inp} /></div>
      <div style={{ marginBottom: 8 }}><label style={S.lbl}>Descrição</label><input value={form.description || ""} onChange={e => setForm({ ...form, description: e.target.value })} placeholder="O que este alerta faz" style={S.inp} /></div>
      <div style={{ display: "flex", justifyContent: "flex-end", gap: 6 }}>
        <button onClick={() => setShowForm(false)} style={{ fontFamily: "inherit", fontSize: 11, background: "#F2F2F7", color: "#86868B", border: "none", borderRadius: 8, padding: "7px 14px", cursor: "pointer" }}>Cancelar</button>
        <button onClick={saveForm} disabled={!form.emails.trim()} style={{ ...S.btn, opacity: form.emails.trim() ? 1 : .4 }}>Salvar</button>
      </div>
    </div>}

    {/* ALERTS LIST */}
    {alerts.length === 0 && <div style={{ ...S.card, textAlign: "center", color: "#AEAEB2", padding: 24, fontSize: 12 }}>Nenhum alerta. Use a IA acima para criar!</div>}

    {alerts.map((a, idx) => {
      const info = a.description ? { icon: a.createdByAI ? "✨" : "⚡", label: a.description } : typeInfo(a.type);
      const count = getCount(a.type, a.days);
      return (<div key={a.id || idx} style={{ ...S.card, marginBottom: 8, opacity: a.active ? 1 : .5, borderLeft: `3px solid ${a.active ? (a.createdByAI ? "#AF52DE" : "#007AFF") : "#D1D1D6"}`, borderRadius: "3px 12px 12px 3px" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8, flexWrap: "wrap" }}>
          <div style={{ flex: 1 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 4 }}>
              <span style={{ fontSize: 14 }}>{typeof info.icon === "string" ? info.icon : "⚡"}</span>
              <span style={{ fontSize: 12, fontWeight: 700 }}>{info.label || info.desc || a.type}</span>
              {a.createdByAI && <span style={{ fontSize: 8, background: "#AF52DE18", color: "#AF52DE", padding: "1px 6px", borderRadius: 4, fontWeight: 600 }}>IA</span>}
              {!a.active && <span style={{ fontSize: 8, color: "#AEAEB2", background: "#F2F2F7", padding: "1px 6px", borderRadius: 4 }}>Pausado</span>}
            </div>
            <div style={{ fontSize: 10, color: "#86868B" }}>Para: {a.emails}</div>
            {a.days && <div style={{ fontSize: 10, color: "#86868B" }}>{a.type === "stale" ? `${a.days}d sem atualização` : `${a.days}d antecedência`}</div>}
            <div style={{ fontSize: 10, color: count > 0 ? "#E8363C" : "#34C759", fontWeight: 600, marginTop: 3 }}>{count > 0 ? `${count} item(ns) agora` : "✓ Nada pendente"}</div>
          </div>
          <div style={{ display: "flex", gap: 4, flexDirection: "column", alignItems: "flex-end" }}>
            <button onClick={() => fireAlert(a)} disabled={count === 0} style={{ fontFamily: "inherit", fontSize: 10, fontWeight: 600, background: count > 0 ? "#007AFF" : "#E5E5EA", color: count > 0 ? "#fff" : "#AEAEB2", border: "none", borderRadius: 8, padding: "6px 12px", cursor: count > 0 ? "pointer" : "default" }}>📧 Disparar</button>
            <div style={{ display: "flex", gap: 3 }}>
              <button onClick={() => toggleAlert(idx)} style={{ fontFamily: "inherit", fontSize: 9, background: "#F2F2F7", color: "#86868B", border: "none", borderRadius: 6, padding: "3px 7px", cursor: "pointer" }}>{a.active ? "Pausar" : "Ativar"}</button>
              <button onClick={() => startEdit(idx)} style={{ fontFamily: "inherit", fontSize: 9, background: "#F2F2F7", color: "#86868B", border: "none", borderRadius: 6, padding: "3px 7px", cursor: "pointer" }}>✎</button>
              <button onClick={() => delAlert(idx)} style={{ fontFamily: "inherit", fontSize: 9, background: "#FF3B3012", color: "#E8363C", border: "none", borderRadius: 6, padding: "3px 7px", cursor: "pointer" }}>✕</button>
            </div>
          </div>
        </div>
      </div>);
    })}
  </div>);
}

/* ===== UPDATES TAB (drag & drop images) ===== */
function UpdatesTab({ project, userId, un, uc, onAddUpdate, onDeleteUpdate }) {
  const [text, setText] = useState("");
  const [date, setDate] = useState(today());
  const [images, setImages] = useState([]);
  const [dragging, setDragging] = useState(false);
  const fileRef = useRef();
  const dropRef = useRef();

  const processFiles = (files) => {
    [...files].forEach(f => {
      if (!f.type.startsWith("image/")) return;
      const reader = new FileReader();
      reader.onload = ev => setImages(prev => [...prev, { name: f.name, data: ev.target.result }]);
      reader.readAsDataURL(f);
    });
  };

  const handleDrop = (e) => { e.preventDefault(); setDragging(false); processFiles(e.dataTransfer.files); };
  const handleDragOver = (e) => { e.preventDefault(); setDragging(true); };
  const handleDragLeave = () => setDragging(false);
  const handleFileInput = (e) => { processFiles(e.target.files); e.target.value = ""; };

  const submit = () => {
    if (!text.trim() && !images.length) return;
    onAddUpdate({ text: text.trim(), images, manualPost: true, date });
    setText(""); setImages([]); setDate(today());
  };

  const updates = [...(project.updates || [])].reverse();

  return (<div>
    {/* Post box */}
    <div style={{ ...S.card, marginBottom: 14 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 10 }}>
        <span style={{ width: 10, height: 10, borderRadius: "50%", background: uc(userId) }} />
        <span style={{ fontSize: 12, fontWeight: 600 }}>{un(userId)}</span>
        <span style={{ fontSize: 10, color: "#AEAEB2" }}>· Nova atualização</span>
      </div>
      <div style={{ display: "flex", gap: 8, alignItems: "flex-start", marginBottom: 8 }}>
        <textarea value={text} onChange={e => setText(e.target.value)} placeholder="Escreva uma atualização sobre o projeto..." style={{ ...S.inp, minHeight: 70, resize: "vertical", fontSize: 14, lineHeight: 1.5, flex: 1 }} />
        <MicBtn onResult={t => setText(t)} sz={44} />
      </div>
      <div style={{ marginBottom: 8 }}>
        <label style={S.lbl}>Data da atualização</label>
        <input type="date" value={date} onChange={e => setDate(e.target.value)} style={{ ...S.inp, width: 160 }} />
      </div>

      {/* Drop zone */}
      <div ref={dropRef} onDrop={handleDrop} onDragOver={handleDragOver} onDragLeave={handleDragLeave} onClick={() => fileRef.current?.click()}
        style={{ border: `2px dashed ${dragging ? "#007AFF" : "#E5E5EA"}`, borderRadius: 10, padding: images.length ? "8px" : "20px 14px", textAlign: "center", cursor: "pointer", background: dragging ? "#F0F9FF" : "#FAFAFA", transition: "all .2s", marginBottom: 8 }}>
        <input ref={fileRef} type="file" multiple accept="image/*" onChange={handleFileInput} style={{ display: "none" }} />
        {images.length === 0 ? (
          <div>
            <div style={{ fontSize: 24, marginBottom: 4 }}>📷</div>
            <div style={{ fontSize: 12, color: "#86868B" }}>Arraste fotos aqui ou toque para selecionar</div>
            <div style={{ fontSize: 10, color: "#AEAEB2", marginTop: 2 }}>JPG, PNG, HEIC</div>
          </div>
        ) : (
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
            {images.map((img, i) => (
              <div key={i} style={{ position: "relative" }}>
                <img src={img.data} alt={img.name} style={{ width: 72, height: 72, objectFit: "cover", borderRadius: 8, border: "1px solid #E5E5EA" }} />
                <button onClick={(e) => { e.stopPropagation(); setImages(images.filter((_, j) => j !== i)); }}
                  style={{ position: "absolute", top: -5, right: -5, background: "#E8363C", color: "#fff", border: "none", borderRadius: 10, width: 18, height: 18, fontSize: 10, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>✕</button>
              </div>
            ))}
            <div style={{ width: 72, height: 72, background: "#F2F2F7", borderRadius: 8, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20, color: "#AEAEB2" }}>+</div>
          </div>
        )}
      </div>

      <button onClick={submit} disabled={!text.trim() && !images.length} style={{ ...S.btn, width: "100%", padding: 12, fontSize: 13, borderRadius: 10, opacity: (text.trim() || images.length) ? 1 : .4 }}>Publicar Atualização</button>
    </div>

    {/* Feed */}
    {updates.length === 0 ? <div style={{ ...S.card, textAlign: "center", color: "#AEAEB2", padding: 24, fontSize: 12 }}>Sem atualizações ainda. Publique a primeira!</div> :
      updates.map(u => (
        <div key={u.id} style={{ ...S.card, marginBottom: 8 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 6 }}>

  </div>);
}

/* ===== SMART AI UPDATE ===== */
function SmartUpdate({ projects, userId, onApply, onClose }) {
  const [text, setText] = useState(""); const [step, setStep] = useState("input"); const [result, setResult] = useState(null); const [err, setErr] = useState("");
  const projCtx = projects.map(p => `• "${p.name}" (id:${p.id}) — Ações: ${(p.actions || []).filter(a => a.status !== "Concluída").map(a => `[${a.id}] "${a.title}" (${a.status})`).join(", ") || "nenhuma"}`).join("\n");
  const process = async () => { if (!text.trim()) return; setStep("processing"); setErr(""); try { const sysP = `Interprete atualização de projeto Policontrol. JSON puro sem backticks.\n\nPROJETOS:\n${projCtx}\n\nHOJE: ${today()}\n\nREGRAS:\n1. Identifique projeto pelo contexto\n2. Ações concluídas → completeActions (IDs)\n3. Novos passos → newActions\n4. summary = frase curta\n\nJSON: {"projectId":"","projectName":"","summary":"","completeActions":[],"newActions":[{"title":"","description":"","dueDate":""}],"newStatus":null,"newObs":null}\n\nSe não identificar: {"error":"msg"}`; const raw = await callAI(sysP, text); const parsed = JSON.parse(raw); if (parsed.error) { setErr(parsed.error); setStep("input"); return; } parsed.originalText = text; setResult(parsed); setStep("review"); } catch (e) { setErr("Erro: " + e.message); setStep("input"); } };
  const proj = result ? projects.find(p => p.id === result.projectId) : null;
  return (<div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.35)", backdropFilter: "blur(8px)", zIndex: 200, display: "flex", alignItems: "center", justifyContent: "center", padding: 14 }} onClick={onClose}><div onClick={e => e.stopPropagation()} style={{ background: "#fff", borderRadius: 20, padding: 24, maxWidth: 480, width: "100%", maxHeight: "90vh", overflow: "auto", boxShadow: "0 20px 60px rgba(0,0,0,0.15)" }}>
    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}><h3 style={{ fontSize: 18, fontWeight: 700, margin: 0 }}>🎤 Atualização Inteligente</h3><button onClick={onClose} style={{ fontFamily: "inherit", background: "#F2F2F7", border: "none", borderRadius: 16, width: 30, height: 30, cursor: "pointer", fontSize: 13, color: "#86868B" }}>✕</button></div>
    {step === "input" && <><p style={{ fontSize: 13, color: "#86868B", marginBottom: 6, lineHeight: 1.5 }}>Fale ou digite livremente. A IA identifica o projeto e gerencia as ações.</p><p style={{ fontSize: 11, color: "#AEAEB2", marginBottom: 10, fontStyle: "italic" }}>Ex: "Já enviei placas pro Fiore, retorna até 15/04"</p><div style={{ display: "flex", gap: 8, alignItems: "flex-start", marginBottom: 10 }}><textarea value={text} onChange={e => setText(e.target.value)} placeholder="Fale ou digite o que aconteceu..." style={{ ...S.inp, minHeight: 90, resize: "vertical", fontSize: 15, lineHeight: 1.5, flex: 1 }} /><MicBtn onResult={t => setText(t)} sz={52} /></div>{err && <p style={{ fontSize: 12, color: "#E8363C", marginBottom: 8 }}>{err}</p>}<button onClick={process} disabled={!text.trim()} style={{ ...S.btn, width: "100%", padding: 14, fontSize: 15, opacity: text.trim() ? 1 : .4, borderRadius: 12 }}>Processar com IA ✨</button></>}
    {step === "processing" && <div style={{ textAlign: "center", padding: 40 }}><div style={{ width: 36, height: 36, border: "3px solid #E5E5EA", borderTopColor: "#007AFF", borderRadius: "50%", animation: "spin .7s linear infinite", margin: "0 auto" }} /><p style={{ color: "#86868B", marginTop: 14, fontSize: 14 }}>Interpretando...</p></div>}
    {step === "review" && result && <><div style={{ background: "#F0F9FF", border: "1px solid #007AFF22", borderRadius: 12, padding: 14, marginBottom: 14 }}><div style={{ fontSize: 14, fontWeight: 700, color: "#007AFF", marginBottom: 8 }}>📋 {result.projectName}</div><div style={{ fontSize: 13, color: "#1D1D1F", marginBottom: 10, lineHeight: 1.5 }}>{result.summary}</div>{result.completeActions?.length > 0 && <div style={{ marginBottom: 10 }}><div style={{ fontSize: 11, fontWeight: 700, color: "#28A745", marginBottom: 4 }}>✅ Finalizadas:</div>{result.completeActions.map(aid => { const a = proj?.actions?.find(x => x.id === aid); return a ? <div key={aid} style={{ fontSize: 12, color: "#6E6E73", marginLeft: 8 }}>• <s>{a.title}</s> → Concluída</div> : null; })}</div>}{result.newActions?.length > 0 && <div style={{ marginBottom: 10 }}><div style={{ fontSize: 11, fontWeight: 700, color: "#007AFF", marginBottom: 4 }}>🆕 Novas ações:</div>{result.newActions.map((a, i) => <div key={i} style={{ fontSize: 12, color: "#1D1D1F", marginLeft: 8 }}>• <strong>{a.title}</strong>{a.dueDate ? ` — ${fmt(a.dueDate)}` : ""}</div>)}</div>}{result.newStatus && <div style={{ fontSize: 12, color: "#6E6E73" }}>Status → <strong>{result.newStatus}</strong></div>}</div><div style={{ display: "flex", gap: 8 }}><button onClick={() => { setStep("input"); setResult(null); }} style={{ fontFamily: "inherit", flex: 1, fontSize: 13, background: "#F2F2F7", color: "#6E6E73", border: "none", borderRadius: 10, padding: 12, cursor: "pointer" }}>✏ Corrigir</button><button onClick={() => onApply(result)} style={{ ...S.btn, flex: 1, padding: 12, fontSize: 13, borderRadius: 10 }}>✅ Aplicar</button></div></>}
  </div></div>);
}

function FP({ proj, users, onSave, onCancel }) {

  const isEditing = !!proj;

  const updCron = (eIdx, aIdx, k, v) => {
    const ng = [...f.cronograma];
    ng[eIdx].atividades[aIdx] = { ...ng[eIdx].atividades[aIdx], [k]: v };
    sF({ ...f, cronograma: ng });
  };
  const addAtiv = (eIdx) => {
    const ng = [...f.cronograma];
    const nextNum = ng[eIdx].atividades.length + 1;
    ng[eIdx].atividades.push({ id: `${ng[eIdx].etapa}.${nextNum}`, nome: "", responsavel: users[0].id, dias: 7 });
    sF({ ...f, cronograma: ng });
  };
  const delAtiv = (eIdx, aIdx) => {
    const ng = [...f.cronograma];
    ng[eIdx].atividades.splice(aIdx, 1);
    sF({ ...f, cronograma: ng });
  };

  const handleSave = () => {
    if (isNovoProduto && !isEditing) {
      // Generate actions from cronograma
      const startDate = f.inicio || f.abertura || today();
      const start = new Date(startDate + "T00:00:00");
      let cumDays = 0;
      const actionsFromCron = [];
      f.cronograma.forEach(etapa => {
        etapa.atividades.forEach(at => {
          if (!at.nome.trim()) return;
          cumDays += parseInt(at.dias) || 0;
          const due = new Date(start);
          due.setDate(due.getDate() + cumDays);
          actionsFromCron.push({
            title: at.nome,
            description: `Etapa ${etapa.etapa} (${etapa.titulo}) — ${at.id}`,

            dueDate: due.toISOString().slice(0, 10),

            style={{ width: "100%", minHeight: 280, padding: 12, border: "1px solid #E5E5EA", borderRadius: 10, fontSize: 12, fontFamily: "inherit", resize: "vertical", boxSizing: "border-box", lineHeight: 1.5 }}

            {aiPrompt.length} caracteres {aiPrompt.length < 100 ? "(mínimo 100)" : "✓"}

vel de decisão (técnica, financeira)\n- patrocinadorResp: responsabilidades do patrocinador\n- patrocinadorAutoridade: nível de decisão estratégica\n\nProjeto: ${f.name || "(sem nome)"}\nÁrea: ${f.area}`;

      <button onClick={() => onSave(users.map((u, i) => ({ ...u, name: n[i] || u.name, email: emails[i] || "", phone: phones[i] || "" })))} style={{ ...S.btn, marginTop: 6, width: "100%" }}>Salvar</button>
    </div>

    {/* AUDIT LOG */}
    <div style={{ ...S.card, marginBottom: 10 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <h3 style={{ fontSize: 13, fontWeight: 700, margin: 0 }}>📋 Registro de Alterações</h3>
        <button onClick={() => setShowAudit(!showAudit)} style={{ fontFamily: "inherit", fontSize: 10, background: "#F2F2F7", color: "#86868B", border: "none", borderRadius: 6, padding: "4px 10px", cursor: "pointer" }}>{showAudit ? "Ocultar" : `Ver (${(audit || []).length})`}</button>
      </div>
      {showAudit && <div style={{ marginTop: 10, maxHeight: 300, overflow: "auto" }}>
        {(!audit || audit.length === 0) ? <p style={{ fontSize: 12, color: "#AEAEB2", textAlign: "center", padding: 16 }}>Nenhuma alteração registrada.</p> :
          [...audit].reverse().map(a => (
            <div key={a.id} style={{ padding: "8px 0", borderBottom: "1px solid #F2F2F7", display: "flex", gap: 8, alignItems: "flex-start" }}>
              <div style={{ width: 6, height: 6, borderRadius: "50%", background: a.action === "remove_user" ? "#E8363C" : a.action === "add_user" ? "#34C759" : "#007AFF", marginTop: 5, flexShrink: 0 }} />
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 12, color: "#1D1D1F" }}>{a.detail}</div>
                <div style={{ fontSize: 10, color: "#AEAEB2", marginTop: 2 }}>Por {un(a.userId)} · {fmtFull(a.timestamp)}</div>
              </div>
            </div>
          ))}
      </div>}
    </div>

    <div style={{ ...S.card, border: "1px solid #FF3B3022" }}><h3 style={{ fontSize: 13, fontWeight: 700, marginTop: 0, marginBottom: 4, color: "#E8363C" }}>Restaurar</h3><button onClick={onReset} style={{ fontFamily: "inherit", fontSize: 11, background: "none", color: "#E8363C", border: "1px solid #E8363C44", borderRadius: 8, padding: "6px 14px", cursor: "pointer", marginTop: 4 }}>Restaurar dados</button></div>
  </div>);
}

const S = {
  ctr: { display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", minHeight: "100vh", background: "#F2F2F7" },
  spin: { width: 24, height: 24, border: "3px solid #E5E5EA", borderTopColor: "#007AFF", borderRadius: "50%", animation: "spin .7s linear infinite" },
  kf: `@keyframes spin{to{transform:rotate(360deg)}}@keyframes fadeIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:none}}@keyframes recording{0%,100%{opacity:1}50%{opacity:.4}}`,
  h2: { fontSize: 18, fontWeight: 700, margin: "0 0 14px" },
  card: { background: "#fff", borderRadius: 12, padding: 14, boxShadow: "0 1px 3px rgba(0,0,0,0.04)" },
  td: { padding: "9px 7px", borderBottom: "1px solid #F2F2F7" },
  btn: { fontFamily: "'Inter',sans-serif", fontSize: 12, fontWeight: 600, background: "#007AFF", color: "#fff", border: "none", borderRadius: 8, padding: "8px 16px", cursor: "pointer", whiteSpace: "nowrap" },
  inp: { fontFamily: "'Inter',sans-serif", fontSize: 12, width: "100%", boxSizing: "border-box", background: "#F9F9F9", color: "#1D1D1F", border: "1px solid #E5E5EA", borderRadius: 8, padding: "8px 10px", outline: "none" },
  lbl: { display: "block", fontSize: 9, fontWeight: 700, color: "#AEAEB2", marginBottom: 3, letterSpacing: .3, textTransform: "uppercase" },
};

ReactDOM.render(<App/>, document.getElementById("root"));
</script></body></html>
